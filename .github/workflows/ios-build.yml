name: iOS Build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ios-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify checkout
        run: |
          echo "HEAD=$(git rev-parse HEAD)"
          echo "GITHUB_SHA=$GITHUB_SHA"
          git log -1 --oneline
          grep -n "let role\|let isVip" CineViet/Services/LibraryService.swift

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Show build settings
        run: xcodebuild -project CineViet.xcodeproj -scheme CineViet -showBuildSettings >/dev/null

      - name: Build for iOS Simulator
        run: |
          set +e
          set -o pipefail
          xcodebuild \
            -project CineViet.xcodeproj \
            -scheme CineViet \
            -configuration Debug \
            -sdk iphonesimulator \
            -destination 'generic/platform=iOS Simulator' \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | tee xcodebuild.log
          status=${PIPESTATUS[0]}
          if [ "$status" -ne 0 ]; then
            echo '### Swift build errors' >> "$GITHUB_STEP_SUMMARY"
            echo '```text' >> "$GITHUB_STEP_SUMMARY"
            grep -E '(^|: )(error:|fatal error:)|BUILD FAILED' xcodebuild.log | tail -100 | tee build-errors.txt >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            cat build-errors.txt 2>/dev/null || true
            while IFS= read -r line; do
              safe_line=${line//'%'/'%25'}
              safe_line=${safe_line//$'\r'/'%0D'}
              safe_line=${safe_line//$'\n'/'%0A'}
              echo "::error title=Swift compiler::$safe_line"
            done < build-errors.txt
          fi
          exit "$status"

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
          if-no-files-found: ignore
