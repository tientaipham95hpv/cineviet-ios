name: iOS Test IPA

on:
  workflow_dispatch:
    inputs:
      signing:
        description: "Use Apple signing secrets when available"
        required: true
        default: "unsigned"
        type: choice
        options:
          - unsigned
          - signed

jobs:
  archive:
    runs-on: macos-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - run: sudo xcode-select -s /Applications/Xcode.app
      - run: brew install xcodegen
      - run: xcodegen generate

      - name: Build unsigned device archive
        if: inputs.signing == 'unsigned'
        run: |
          xcodebuild -project CineViet.xcodeproj -scheme CineViet -configuration Release \
            -destination 'generic/platform=iOS' -archivePath "$RUNNER_TEMP/CineViet.xcarchive" \
            CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO archive

      - name: Package unsigned IPA artifact
        if: inputs.signing == 'unsigned'
        run: |
          APP_PATH="$RUNNER_TEMP/CineViet.xcarchive/Products/Applications/CineViet.app"
          test -d "$APP_PATH"
          mkdir -p "$RUNNER_TEMP/unsigned/Payload"
          cp -R "$APP_PATH" "$RUNNER_TEMP/unsigned/Payload/"
          (cd "$RUNNER_TEMP/unsigned" && zip -qry "$RUNNER_TEMP/CineViet-unsigned.ipa" Payload)
          echo "Unsigned IPA is a build artifact only; it is not installable until Apple-signed." >> "$GITHUB_STEP_SUMMARY"

      - name: Import signing assets
        if: inputs.signing == 'signed'
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          test -n "$IOS_CERTIFICATE_BASE64"
          test -n "$IOS_PROVISION_PROFILE_BASE64"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          PROFILE_PATH="$RUNNER_TEMP/profile.mobileprovision"
          KEYCHAIN_PATH="$RUNNER_TEMP/app-signing.keychain-db"
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o "$CERTIFICATE_PATH"
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o "$PROFILE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp "$PROFILE_PATH" "$HOME/Library/MobileDevice/Provisioning Profiles/"

      - name: Archive signed build
        if: inputs.signing == 'signed'
        run: |
          xcodebuild -project CineViet.xcodeproj -scheme CineViet -configuration Release \
            -destination 'generic/platform=iOS' -archivePath "$RUNNER_TEMP/CineViet.xcarchive" \
            -allowProvisioningUpdates archive

      - name: Export signed IPA
        if: inputs.signing == 'signed'
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          cat > "$RUNNER_TEMP/ExportOptions.plist" <<PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0"><dict>
            <key>method</key><string>development</string>
            <key>teamID</key><string>$APPLE_TEAM_ID</string>
            <key>signingStyle</key><string>automatic</string>
            <key>stripSwiftSymbols</key><true/>
          </dict></plist>
          PLIST
          xcodebuild -exportArchive -archivePath "$RUNNER_TEMP/CineViet.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" -exportOptionsPlist "$RUNNER_TEMP/ExportOptions.plist" \
            -allowProvisioningUpdates

      - uses: actions/upload-artifact@v4
        if: inputs.signing == 'unsigned'
        with:
          name: CineViet-unsigned-ipa-build-artifact
          path: ${{ runner.temp }}/CineViet-unsigned.ipa
          if-no-files-found: error

      - uses: actions/upload-artifact@v4
        if: inputs.signing == 'signed'
        with:
          name: CineViet-test-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error
